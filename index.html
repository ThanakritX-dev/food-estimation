<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Estimator Full Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#e8f0ff,#f6f9ff);
text-align:center;
padding:20px;
color:#2c3e50;
}

.section{
background:white;
padding:20px;
margin:20px auto;
max-width:900px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

button{
padding:10px 20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
cursor:pointer;
margin:5px;
}

img{
max-width:250px;
margin-top:10px;
border-radius:15px;
}

input,select{
padding:8px;
border-radius:8px;
margin:5px;
}
</style>
</head>

<body>

<h2>Food Estimator Dashboard</h2>

<div class="section">

<h3>เลือกคนไข้</h3>
<select id="patientSelect"></select>

<br>

<label>จาก:</label>
<input type="date" id="startDate">
<label>ถึง:</label>
<input type="date" id="endDate">

<br>

<button onclick="loadChart()">ดูกราฟ</button>
<button onclick="resetDate()">ดูทั้งหมด</button>

<div id="patientInfo"></div>

</div>

<div class="section">

<h3>ถ่ายรูปบันทึกมื้ออาหาร</h3>

<input type="file" accept="image/*" id="beforeInput">
<input type="file" accept="image/*" id="afterInput">

<br>

<img id="beforeImg">
<img id="afterImg">

<br>

<button onclick="compareImages()">คำนวณและบันทึก</button>

<div id="result"></div>

<canvas id="diffCanvas"></canvas>

</div>

<div class="section">
<h3>Dashboard การกินอาหาร (%)</h3>
<canvas id="chartCanvas"></canvas>
</div>

<script>

const scriptURL="YOUR_SCRIPT_URL";
let selectedName="";
let selectedData={};
let chartInstance=null;

// โหลดรายชื่อ
function loadPatients(){
fetch(scriptURL+"?type=patients")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("patientSelect");
select.innerHTML='<option value="">-- เลือกคนไข้ --</option>';
for(let i=1;i<data.length;i++){
let row=data[i];
let option=document.createElement("option");
option.value=JSON.stringify(row);
option.text=row[0];
select.appendChild(option);
}
});
}

// เลือกคนไข้
patientSelect.addEventListener("change",function(){
if(!this.value) return;

let row=JSON.parse(this.value);
selectedName=row[0];

let bmi=(row[2]/((row[3]/100)*(row[3]/100))).toFixed(2);

selectedData={
name:row[0],
dx:row[1],
weight:row[2],
height:row[3],
bmi:bmi
};

patientInfo.innerHTML=
"DX: "+row[1]+"<br>"+
"Weight: "+row[2]+" kg<br>"+
"Height: "+row[3]+" cm<br>"+
"BMI: "+bmi;

loadChart();
});

// โหลดรูป
beforeInput.onchange=()=>loadImage(beforeInput,beforeImg);
afterInput.onchange=()=>loadImage(afterInput,afterImg);

function loadImage(input,img){
let file=input.files[0];
if(!file) return;
let reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
reader.readAsDataURL(file);
}

// คำนวณและบันทึก
function compareImages(){

if(!selectedName){
alert("เลือกคนไข้ก่อน");
return;
}

if(!beforeImg.src || !afterImg.src){
alert("เลือกรูปก่อน");
return;
}

let canvas=diffCanvas;
let ctx=canvas.getContext("2d");

let width=Math.min(beforeImg.width,afterImg.width);
let height=Math.min(beforeImg.height,afterImg.height);

canvas.width=width;
canvas.height=height;

ctx.drawImage(beforeImg,0,0,width,height);
let data1=ctx.getImageData(0,0,width,height);

ctx.drawImage(afterImg,0,0,width,height);
let data2=ctx.getImageData(0,0,width,height);

let diffCount=0;

for(let i=0;i<data1.data.length;i+=4){
let diff=
Math.abs(data1.data[i]-data2.data[i])+
Math.abs(data1.data[i+1]-data2.data[i+1])+
Math.abs(data1.data[i+2]-data2.data[i+2]);

if(diff>60) diffCount++;
}

let diffPercent=((diffCount/(width*height))*100).toFixed(2);

result.innerHTML="Difference: "+diffPercent+"%";

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
date:new Date().toISOString(),
name:selectedData.name,
dx:selectedData.dx,
weight:selectedData.weight,
height:selectedData.height,
bmi:selectedData.bmi,
diffPercent:diffPercent,
pixel:diffCount
})
})
.then(()=>{
result.innerHTML+="<br>บันทึกสำเร็จ ✅";
loadChart();
});

}

// โหลดกราฟ
function loadChart(){

if(!selectedName) return;

let start=startDate.value;
let end=endDate.value;

fetch(scriptURL+"?type=meals")
.then(res=>res.json())
.then(data=>{

let labels=[];
let values=[];

for(let i=1;i<data.length;i++){

let rowDate=new Date(data[i][0]);
if(data[i][1]===selectedName){

if(start && rowDate < new Date(start)) continue;
if(end && rowDate > new Date(end+"T23:59:59")) continue;

labels.push(rowDate.toLocaleDateString());
values.push(parseFloat(data[i][6]));
}
}

drawChart(labels,values);

});
}

function drawChart(labels,values){

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(chartCanvas,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Diff %",
data:values,
tension:0.4,
borderWidth:3
}]
},
options:{
scales:{ y:{beginAtZero:true,max:100}}
}
});
}

function resetDate(){
startDate.value="";
endDate.value="";
loadChart();
}

window.onload=loadPatients;

</script>

</body>
</html>
