<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Estimator Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
box-sizing:border-box;
}

body{
font-family: 'Segoe UI', Tahoma, sans-serif;
background:linear-gradient(135deg,#e8f0ff,#f6f9ff);
margin:0;
padding:30px 15px;
text-align:center;
color:#2c3e50;
}

h2{
margin-bottom:25px;
font-weight:600;
}

.section{
background:white;
padding:25px;
margin:20px auto;
width:100%;
max-width:750px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:0.3s;
}

.section:hover{
transform:translateY(-3px);
box-shadow:0 20px 45px rgba(0,0,0,0.12);
}

h3{
margin-bottom:15px;
font-weight:600;
color:#34495e;
}

select,input{
padding:10px 12px;
border-radius:10px;
border:1px solid #dfe6e9;
font-size:14px;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button:hover{
transform:scale(1.05);
}

img{
width:100%;
max-width:300px;
border-radius:15px;
margin-top:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.image-row{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

#result{
margin-top:15px;
font-size:18px;
font-weight:600;
}

.badge{
display:inline-block;
padding:8px 15px;
border-radius:20px;
color:white;
font-size:14px;
margin-top:8px;
}

.green{
background:#2ecc71;
}

.orange{
background:#f39c12;
}

.red{
background:#e74c3c;
}

canvas{
margin-top:20px;
}
</style>
</head>
<body>

<h2>Food Estimator Dashboard</h2>

<div class="section">
<h3>เลือกคนไข้</h3>
<select id="patientSelect">
<option value="">-- เลือกคนไข้ --</option>
</select>
<div id="patientInfo"></div>
</div>

<div class="section">
<h3>Before / After</h3>

<div class="image-row">

<div>
<h4>Before</h4>
<input type="file" accept="image/*" id="beforeInput">
<img id="beforeImg">
</div>

<div>
<h4>After</h4>
<input type="file" accept="image/*" id="afterInput">
<img id="afterImg">
</div>

</div>
</div>

<div class="section">
<button onclick="compareImages()">คำนวณ</button>
<h3 id="result"></h3>
<canvas id="diffCanvas"></canvas>
</div>

<div class="section">
<h3>Dashboard</h3>
<canvas id="chartCanvas"></canvas>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzSEKwDgxyvTFj2M-5d-Xfp6aLrB4946GuloIb0wzqyYTrk9EivMbkU0oUuarAqXoeb8Q/exec"; // 🔴 ใส่ของคุณ

let selectedData={};
let diffPercent=0;
let diffPixel=0;

// ---------------- โหลดรายชื่อคนไข้ ----------------
function loadPatients(){
fetch(scriptURL+"?type=patients")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("patientSelect");
select.innerHTML='<option value="">-- เลือกคนไข้ --</option>';

for(let i=1;i<data.length;i++){
let row=data[i];
let option=document.createElement("option");
option.value=JSON.stringify(row);
option.text=row[0];
select.appendChild(option);
}
});
}

// ---------------- เลือกคนไข้ ----------------
document.getElementById("patientSelect").addEventListener("change",function(){
if(!this.value) return;

let row=JSON.parse(this.value);

let bmi=(row[2]/((row[3]/100)*(row[3]/100))).toFixed(2);

selectedData={
name:row[0],
dx:row[1],
weight:row[2],
height:row[3],
bmi:bmi
};

document.getElementById("patientInfo").innerHTML=
"DX: "+row[1]+"<br>"+
"Weight: "+row[2]+" kg<br>"+
"Height: "+row[3]+" cm<br>"+
"BMI: "+bmi;

loadChart(row[0]);
});

// ---------------- โหลดรูป ----------------
function loadImage(input,img){
let file=input.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=function(e){
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

beforeInput.onchange=()=>loadImage(beforeInput,beforeImg);
afterInput.onchange=()=>loadImage(afterInput,afterImg);

// ---------------- เปรียบเทียบภาพ ----------------
function compareImages(){

if(!selectedData.name){
alert("กรุณาเลือกคนไข้ก่อน");
return;
}

if(!beforeImg.src || !afterImg.src){
alert("กรุณาเลือกรูป Before และ After");
return;
}

let img1=beforeImg;
let img2=afterImg;

let canvas=document.getElementById("diffCanvas");
let ctx=canvas.getContext("2d");

let width=Math.min(img1.width,img2.width);
let height=Math.min(img1.height,img2.height);

canvas.width=width;
canvas.height=height;

ctx.drawImage(img1,0,0,width,height);
let data1=ctx.getImageData(0,0,width,height);

ctx.drawImage(img2,0,0,width,height);
let data2=ctx.getImageData(0,0,width,height);

let diffCount=0;

for(let i=0;i<data1.data.length;i+=4){

let r1=data1.data[i];
let g1=data1.data[i+1];
let b1=data1.data[i+2];

let r2=data2.data[i];
let g2=data2.data[i+1];
let b2=data2.data[i+2];

let diff=Math.abs(r1-r2)+Math.abs(g1-g2)+Math.abs(b1-b2);

if(diff>60){
data1.data[i]=255;
data1.data[i+1]=0;
data1.data[i+2]=0;
diffCount++;
}
}

ctx.putImageData(data1,0,0);

diffPixel=diffCount;
diffPercent=((diffCount/(width*height))*100).toFixed(2);

let level="";
let badgeClass="";

if(diffPercent<20){
level="กินเกือบหมด";
badgeClass="green";
}
else if(diffPercent<50){
level="กินประมาณครึ่งหนึ่ง";
badgeClass="orange";
}
else{
level="เหลืออาหารเยอะ";
badgeClass="red";
}

document.getElementById("result").innerHTML=
"Difference: "+diffPercent+"%<br>"+
'<div class="badge '+badgeClass+'">'+level+'</div>';

saveToSheet();
}

// ---------------- บันทึกข้อมูล ----------------
function saveToSheet(){

document.getElementById("result").innerHTML+="<br>กำลังบันทึก...";

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
date:new Date().toISOString(),
name:selectedData.name,
dx:selectedData.dx,
weight:selectedData.weight,
height:selectedData.height,
bmi:selectedData.bmi,
diffPercent:diffPercent,
pixel:diffPixel
})
})
.then(()=>{
document.getElementById("result").innerHTML+="<br>บันทึกสำเร็จ ✅";
loadChart(selectedData.name);
});
}

// ---------------- โหลดกราฟ ----------------
function loadChart(name){

fetch(scriptURL+"?type=meals")
.then(res=>res.json())
.then(data=>{

let labels=[];
let values=[];

for(let i=1;i<data.length;i++){
if(data[i][1]===name){
labels.push(new Date(data[i][0]).toLocaleDateString());
values.push(parseFloat(data[i][6]));
}
}

document.getElementById("chartCanvas").remove();
let canvas=document.createElement("canvas");
canvas.id="chartCanvas";
document.querySelectorAll(".section")[4].appendChild(canvas);

new Chart(canvas,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Diff %",
data:values,
tension:0.3,
fill:false
}]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{
font:{size:14}
}
}
},
elements:{
line:{
borderWidth:3
},
point:{
radius:5
}
},
scales:{
y:{
beginAtZero:true,
max:100
}
}
}
});
});
}

// ---------------- โหลดครั้งแรก ----------------
window.onload=function(){
loadPatients();
}

</script>

</body>
</html>
