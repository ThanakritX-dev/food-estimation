<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Estimator Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#e8f0ff,#f6f9ff);
margin:0;
padding:30px 15px;
text-align:center;
color:#2c3e50;
}

h2{margin-bottom:25px;}

.section{
background:white;
padding:25px;
margin:20px auto;
width:100%;
max-width:900px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

select,input[type="date"]{
padding:10px 12px;
border-radius:10px;
border:1px solid #dfe6e9;
margin:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
font-weight:600;
cursor:pointer;
margin:5px;
}

button:hover{opacity:0.9;}

#patientInfo{
margin-top:15px;
background:#f8fbff;
padding:15px;
border-radius:15px;
display:inline-block;
min-width:250px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat-box{
margin-top:15px;
font-size:16px;
font-weight:600;
}

canvas{
margin-top:20px;
}
</style>
</head>

<body>

<h2>Food Estimator Dashboard</h2>

<div class="section">

<h3>เลือกคนไข้</h3>

<select id="patientSelect">
<option value="">-- เลือกคนไข้ --</option>
</select>

<br>

<label>จาก:</label>
<input type="date" id="startDate">

<label>ถึง:</label>
<input type="date" id="endDate">

<br>

<button onclick="loadFilteredChart()">ดูกราฟ</button>
<button onclick="resetDate()">ดูทั้งหมด</button>

<div id="patientInfo"></div>

<div class="stat-box" id="avgResult"></div>

</div>

<div class="section">
<h3>Dashboard การกินอาหาร (%)</h3>
<canvas id="chartCanvas"></canvas>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzSEKwDgxyvTFj2M-5d-Xfp6aLrB4946GuloIb0wzqyYTrk9EivMbkU0oUuarAqXoeb8Q/exec";

let selectedName="";
let chartInstance=null;

// ---------------- โหลดรายชื่อคนไข้ ----------------
function loadPatients(){
fetch(scriptURL+"?type=patients")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("patientSelect");
select.innerHTML='<option value="">-- เลือกคนไข้ --</option>';

for(let i=1;i<data.length;i++){
let row=data[i];
let option=document.createElement("option");
option.value=JSON.stringify(row);
option.text=row[0];
select.appendChild(option);
}
});
}

// ---------------- เลือกคนไข้ ----------------
document.getElementById("patientSelect").addEventListener("change",function(){

if(!this.value) return;

let row=JSON.parse(this.value);

selectedName=row[0];

let bmi=(row[2]/((row[3]/100)*(row[3]/100))).toFixed(2);

document.getElementById("patientInfo").innerHTML=
"DX: "+row[1]+"<br>"+
"Weight: "+row[2]+" kg<br>"+
"Height: "+row[3]+" cm<br>"+
"BMI: "+bmi;

loadFilteredChart(); // โหลดกราฟทันทีโดยไม่ต้องอัพรูป

});

// ---------------- รีเซ็ตช่วงวันที่ ----------------
function resetDate(){
document.getElementById("startDate").value="";
document.getElementById("endDate").value="";
loadFilteredChart();
}

// ---------------- โหลดกราฟแบบกรองวันที่ ----------------
function loadFilteredChart(){

if(!selectedName){
alert("กรุณาเลือกคนไข้");
return;
}

let start=document.getElementById("startDate").value;
let end=document.getElementById("endDate").value;

fetch(scriptURL+"?type=meals")
.then(res=>res.json())
.then(data=>{

let labels=[];
let values=[];
let sum=0;
let count=0;

for(let i=1;i<data.length;i++){

let rowDate=new Date(data[i][0]);
let rowName=data[i][1];
let diff=parseFloat(data[i][6]);

if(rowName===selectedName){

if(start && rowDate < new Date(start)) continue;
if(end && rowDate > new Date(end+"T23:59:59")) continue;

labels.push(rowDate.toLocaleDateString());
values.push(diff);

sum+=diff;
count++;
}
}

drawChart(labels,values);

let avg=(count>0)?(sum/count).toFixed(2):0;
document.getElementById("avgResult").innerHTML=
"จำนวนมื้อ: "+count+" มื้อ | ค่าเฉลี่ยการเหลืออาหาร: "+avg+" %";

});
}

// ---------------- วาดกราฟ ----------------
function drawChart(labels,values){

if(chartInstance){
chartInstance.destroy();
}

let ctx=document.getElementById("chartCanvas").getContext("2d");

let gradient=ctx.createLinearGradient(0,0,0,400);
gradient.addColorStop(0,"rgba(79,172,254,0.4)");
gradient.addColorStop(1,"rgba(0,242,254,0.05)");

chartInstance=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Diff %",
data:values,
borderColor:"#4facfe",
backgroundColor:gradient,
tension:0.4,
fill:true,
pointRadius:5,
borderWidth:3
},
{
label:"เป้าหมาย (20%)",
data:new Array(values.length).fill(20),
borderColor:"#e74c3c",
borderDash:[6,6],
pointRadius:0,
borderWidth:2
}
]
},
options:{
responsive:true,
plugins:{
legend:{position:'top'}
},
scales:{
y:{
beginAtZero:true,
max:100
}
}
}
});

}

// ---------------- โหลดครั้งแรก ----------------
window.onload=loadPatients;

</script>

</body>
</html>
