<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Estimator Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#e8f0ff,#f6f9ff);
margin:0;
padding:30px 15px;
text-align:center;
color:#2c3e50;
}

h2{margin-bottom:25px;}

.section{
background:white;
padding:25px;
margin:20px auto;
width:100%;
max-width:750px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.image-row{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

.image-box{
display:flex;
flex-direction:column;
align-items:center;
}

.image-box img{
width:300px;
max-width:100%;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input[type="file"]{
margin-top:5px;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.badge{
display:inline-block;
padding:8px 15px;
border-radius:20px;
color:white;
font-size:14px;
margin-top:8px;
}

.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}

canvas{margin-top:20px;}
</style>
</head>

<body>

<h2>Food Estimator Dashboard</h2>

<div class="section">
<h3>เลือกคนไข้</h3>
<select id="patientSelect">
<option value="">-- เลือกคนไข้ --</option>
</select>
<div id="patientInfo"></div>
</div>

<div class="section">
<h3>Before / After</h3>

<div class="image-row">

<div class="image-box">
<h4>Before</h4>
<img id="beforeImg">
<input type="file" accept="image/*" id="beforeInput">
</div>

<div class="image-box">
<h4>After</h4>
<img id="afterImg">
<input type="file" accept="image/*" id="afterInput">
</div>

</div>
</div>

<div class="section">
<button onclick="compareImages()">คำนวณ</button>
<div id="result"></div>
<canvas id="diffCanvas"></canvas>
</div>

<div class="section">
<h3>Dashboard</h3>
<canvas id="chartCanvas"></canvas>
</div>

<script>

const scriptURL="YOUR_SCRIPT_URL_HERE";

let selectedData={};
let diffPercent=0;
let diffPixel=0;
let chartInstance=null;

// โหลดรายชื่อ
function loadPatients(){
fetch(scriptURL+"?type=patients")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("patientSelect");
select.innerHTML='<option value="">-- เลือกคนไข้ --</option>';

for(let i=1;i<data.length;i++){
let row=data[i];
let option=document.createElement("option");
option.value=JSON.stringify(row);
option.text=row[0];
select.appendChild(option);
}
});
}

// เลือกคนไข้
patientSelect.addEventListener("change",function(){
if(!this.value) return;

let row=JSON.parse(this.value);
let bmi=(row[2]/((row[3]/100)*(row[3]/100))).toFixed(2);

selectedData={
name:row[0],
dx:row[1],
weight:row[2],
height:row[3],
bmi:bmi
};

patientInfo.innerHTML=
"DX: "+row[1]+"<br>"+
"Weight: "+row[2]+" kg<br>"+
"Height: "+row[3]+" cm<br>"+
"BMI: "+bmi;

loadChart(row[0]);
});

// โหลดรูป
function loadImage(input,img){
let file=input.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
reader.readAsDataURL(file);
}

beforeInput.onchange=()=>loadImage(beforeInput,beforeImg);
afterInput.onchange=()=>loadImage(afterInput,afterImg);

// เปรียบเทียบภาพ
function compareImages(){

if(!selectedData.name){
alert("กรุณาเลือกคนไข้ก่อน");
return;
}

if(!beforeImg.src || !afterImg.src){
alert("กรุณาเลือกรูป Before และ After");
return;
}

result.innerHTML="กำลังบันทึก...";

let canvas=diffCanvas;
let ctx=canvas.getContext("2d");

let width=Math.min(beforeImg.naturalWidth,afterImg.naturalWidth);
let height=Math.min(beforeImg.naturalHeight,afterImg.naturalHeight);

canvas.width=width;
canvas.height=height;

ctx.drawImage(beforeImg,0,0,width,height);
let data1=ctx.getImageData(0,0,width,height);

ctx.drawImage(afterImg,0,0,width,height);
let data2=ctx.getImageData(0,0,width,height);

let diffCount=0;

for(let i=0;i<data1.data.length;i+=4){

let diff=
Math.abs(data1.data[i]-data2.data[i])+
Math.abs(data1.data[i+1]-data2.data[i+1])+
Math.abs(data1.data[i+2]-data2.data[i+2]);

if(diff>60){
data1.data[i]=255;
data1.data[i+1]=0;
data1.data[i+2]=0;
diffCount++;
}
}

ctx.putImageData(data1,0,0);

diffPixel=diffCount;
diffPercent=((diffCount/(width*height))*100).toFixed(2);

saveToSheet();
}

// บันทึกข้อมูล
function saveToSheet(){

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
date:new Date().toISOString(),
name:selectedData.name,
dx:selectedData.dx,
weight:selectedData.weight,
height:selectedData.height,
bmi:selectedData.bmi,
diffPercent:diffPercent,
pixel:diffPixel
})
})
.then(()=>{

let level="";
let badgeClass="";

if(diffPercent<20){level="กินเกือบหมด";badgeClass="green";}
else if(diffPercent<50){level="กินประมาณครึ่งหนึ่ง";badgeClass="orange";}
else{level="เหลืออาหารเยอะ";badgeClass="red";}

result.innerHTML=
"Difference: "+diffPercent+"%<br>"+
'<div class="badge '+badgeClass+'">'+level+'</div>'+
"<br>บันทึกสำเร็จ ✅";

loadChart(selectedData.name);
});
}

// โหลดกราฟ
function loadChart(name){

fetch(scriptURL+"?type=meals")
.then(res=>res.json())
.then(data=>{

let labels=[];
let values=[];

for(let i=1;i<data.length;i++){
if(data[i][1]===name){
labels.push(new Date(data[i][0]).toLocaleDateString());
values.push(parseFloat(data[i][6]));
}
}

if(chartInstance){
chartInstance.destroy();
}

chartInstance=new Chart(chartCanvas,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Diff %",
data:values,
tension:0.3,
borderWidth:3,
pointRadius:5
}]
},
options:{
responsive:true,
scales:{
y:{beginAtZero:true,max:100}
}
}
});
});
}

window.onload=loadPatients;

</script>
</body>
</html>
