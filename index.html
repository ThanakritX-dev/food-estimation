<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Estimator Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fbff);
text-align:center;
padding:30px;
color:#2c3e50;
}

h2{
margin-bottom:10px;
}

.section{
background:white;
padding:25px;
margin:25px auto;
max-width:1000px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

select,input{
padding:8px;
border-radius:8px;
margin:5px;
border:1px solid #dfe6ff;
}

.image-compare{
display:flex;
justify-content:center;
align-items:stretch;
margin-top:30px;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.image-card{
flex:1;
padding:25px;
background:#f9fbff;
}

.image-card:first-child{
border-right:4px solid #e0e6ff;
}

.image-title{
font-weight:700;
margin-bottom:15px;
font-size:18px;
letter-spacing:1px;
}

.before-title{
color:#3498db;
}

.after-title{
color:#2ecc71;
}

img{
max-width:100%;
border-radius:15px;
margin-top:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
padding:12px 30px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
cursor:pointer;
margin-top:25px;
font-weight:600;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.diff-section{
margin-top:40px;
padding:30px;
background:linear-gradient(135deg,#fff6f6,#ffecec);
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.diff-title{
font-weight:700;
margin-bottom:20px;
font-size:20px;
color:#e74c3c;
}

#result{
margin-top:15px;
font-weight:600;
font-size:16px;
}

</style>
</head>

<body>

<h2>Food Estimator Dashboard</h2>

<div class="section">

<h3>เลือกคนไข้</h3>
<select id="patientSelect"></select>
<div id="patientInfo"></div>

</div>

<div class="section">

<div class="image-compare">

<div class="image-card">
<div class="image-title before-title">BEFORE (ก่อนทาน)</div>
<input type="file" accept="image/*" id="beforeInput">
<img id="beforeImg">
</div>

<div class="image-card">
<div class="image-title after-title">AFTER (หลังทาน)</div>
<input type="file" accept="image/*" id="afterInput">
<img id="afterImg">
</div>

</div>

<div style="text-align:center;">
<button onclick="compareImages()">คำนวณและบันทึก</button>
</div>

<div id="result"></div>

<div class="diff-section">
<div class="diff-title">DIFFERENCE HIGHLIGHT</div>
<canvas id="diffCanvas"></canvas>
</div>

</div>

<div class="section">
<h3>Dashboard การกินอาหาร (%)</h3>

<div style="margin-bottom:15px;">
จาก:
<input type="date" id="startDate">
ถึง:
<input type="date" id="endDate">
<button onclick="loadChart()">ดูกราฟ</button>
<button onclick="resetDate()">ดูทั้งหมด</button>
</div>

<canvas id="chartCanvas"></canvas>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzSEKwDgxyvTFj2M-5d-Xfp6aLrB4946GuloIb0wzqyYTrk9EivMbkU0oUuarAqXoeb8Q/exec";
let selectedName="";
let selectedData={};
let chartInstance=null;

function loadPatients(){
fetch(scriptURL+"?type=patients")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("patientSelect");
select.innerHTML='<option value="">-- เลือกคนไข้ --</option>';
for(let i=1;i<data.length;i++){
let row=data[i];
let option=document.createElement("option");
option.value=JSON.stringify(row);
option.text=row[0];
select.appendChild(option);
}
});
}

patientSelect.addEventListener("change",function(){
if(!this.value) return;

let row=JSON.parse(this.value);
selectedName=row[0];

let bmi=(row[2]/((row[3]/100)*(row[3]/100))).toFixed(2);

selectedData={
name:row[0],
dx:row[1],
weight:row[2],
height:row[3],
bmi:bmi
};

patientInfo.innerHTML=
"DX: "+row[1]+"<br>"+
"Weight: "+row[2]+" kg<br>"+
"Height: "+row[3]+" cm<br>"+
"BMI: "+bmi;

loadChart();
});

beforeInput.onchange=()=>loadImage(beforeInput,beforeImg);
afterInput.onchange=()=>loadImage(afterInput,afterImg);

function loadImage(input,img){
let file=input.files[0];
if(!file) return;
let reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
reader.readAsDataURL(file);
}

function compareImages(){

if(!selectedName){
alert("เลือกคนไข้ก่อน");
return;
}

if(!beforeImg.src || !afterImg.src){
alert("เลือกรูปก่อน");
return;
}

let canvas=document.getElementById("diffCanvas");
let ctx=canvas.getContext("2d");

let width=Math.min(beforeImg.width,afterImg.width);
let height=Math.min(beforeImg.height,afterImg.height);

canvas.width=width;
canvas.height=height;

ctx.drawImage(beforeImg,0,0,width,height);
let data1=ctx.getImageData(0,0,width,height);

ctx.drawImage(afterImg,0,0,width,height);
let data2=ctx.getImageData(0,0,width,height);

let diffCount=0;

for(let i=0;i<data1.data.length;i+=4){

let r1=data1.data[i];
let g1=data1.data[i+1];
let b1=data1.data[i+2];

let r2=data2.data[i];
let g2=data2.data[i+1];
let b2=data2.data[i+2];

let diff=Math.abs(r1-r2)+Math.abs(g1-g2)+Math.abs(b1-b2);

if(diff>60){

data1.data[i]=255;
data1.data[i+1]=0;
data1.data[i+2]=0;
data1.data[i+3]=160;

diffCount++;
}
else{
data1.data[i+3]=25;
}
}

ctx.putImageData(data1,0,0);

let diffPercent=((diffCount/(width*height))*100).toFixed(2);

result.innerHTML=
"Difference: "+diffPercent+"%<br>"

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
date:new Date().toISOString(),
name:selectedData.name,
dx:selectedData.dx,
weight:selectedData.weight,
height:selectedData.height,
bmi:selectedData.bmi,
diffPercent:diffPercent,
pixel:diffCount
})
})
.then(()=>{
result.innerHTML+="<br>บันทึกสำเร็จ ✅";
loadChart();
});

}

function loadChart(){

if(!selectedName) return;

let start=startDate.value;
let end=endDate.value;

fetch(scriptURL+"?type=meals")
.then(res=>res.json())
.then(data=>{

let labels=[];
let values=[];

for(let i=1;i<data.length;i++){

let rowDate=new Date(data[i][0]);
if(data[i][1]===selectedName){

if(start && rowDate < new Date(start)) continue;
if(end && rowDate > new Date(end+"T23:59:59")) continue;

labels.push(rowDate.toLocaleDateString());
values.push(parseFloat(data[i][6]));
}
}

drawChart(labels,values);

});
}

function drawChart(labels,values){

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(chartCanvas,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Diff %",
data:values,
tension:0.4,
borderWidth:3
}]
},
options:{
scales:{ y:{beginAtZero:true,max:100}}
}
});
}

function resetDate(){
startDate.value="";
endDate.value="";
loadChart();
}

window.onload=loadPatients;

</script>

</body>
</html>
